  <text x="675" y="207" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">P0</text>

  <line x1="570" y1="260" x2="570" y2="290" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Agent 2: Severity Ranking -->
