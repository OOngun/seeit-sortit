  <text x="440" y="232" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">Qwen2.5-VL-7B (vision) + Scribe (STT)</text>
  <text x="440" y="248" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#999999">Classifies issue, extracts GPS, structures report</text>
