<svg xmlns="http://www.w3.org/2000/svg" xmlns:gn="http://www.goodnotes.com/gn-svg" width="1400" height="900" viewBox="0 0 1400 900">
  <text x="700" y="40" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a2e">Reporting a Pothole in London</text>
  <text x="700" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#888888">Current process vs London Civic Agent</text>
  <rect x="40" y="85" width="620" height="48" rx="8" ry="8" fill="#FFCDD2"/>
  <text x="350" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#C62828">TODAY: 8-10 clicks, 5-15 minutes</text>
  <rect x="60" y="155" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">1. Find council website</text>
  <line x1="200" y1="195" x2="200" y2="215" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="218" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="237" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">2. Search for "report a problem"</text>
  <text x="200" y="251" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">No link on any council homepage</text>
  <line x1="200" y1="258" x2="200" y2="278" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="281" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">3. Navigate to correct department</text>
  <text x="200" y="314" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">Roads? Environmental? Recycling?</text>
  <line x1="200" y1="321" x2="200" y2="341" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="344" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="363" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">4. Create account / log in</text>
  <text x="200" y="377" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">Often mandatory (Islington, Camden fly-tip)</text>
  <line x1="200" y1="384" x2="200" y2="404" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="407" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="426" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">5. Place pin precisely on map</text>
  <text x="200" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">Rejected if not exactly on road</text>
  <line x1="200" y1="447" x2="200" y2="467" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="470" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="489" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">6. Pick category (67-146 options)</text>
  <text x="200" y="503" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">"Pothole" buried 2 levels deep</text>
  <line x1="200" y1="510" x2="200" y2="530" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="533" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="552" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">7. Write description (2 fields)</text>
  <text x="200" y="566" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">Summary + detailed explanation</text>
  <line x1="200" y1="573" x2="200" y2="593" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="596" width="280" height="40" rx="6" ry="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="200" y="615" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#C62828">8. Fill personal info (3-5 fields)</text>
  <text x="200" y="629" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#999999">Name, email, phone, password, visibility</text>
  <line x1="200" y1="636" x2="200" y2="656" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="60" y="659" width="280" height="40" rx="6" ry="6" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
  <text x="200" y="684" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#C62828">Submit. Hope for the best.</text>
  <rect x="370" y="155" width="270" height="180" rx="10" ry="10" fill="#FFF3F3" stroke="#FFCDD2" stroke-width="1"/>
  <text x="505" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C62828">Pain Points</text>
  <text x="390" y="202" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">No council has "report" on homepage</text>
  <text x="390" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">Must know the right department</text>
  <text x="390" y="242" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">67-146 category options to navigate</text>
  <text x="390" y="262" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">2 issues = 2 platforms + 2 accounts</text>
  <text x="390" y="282" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">No tracking. No follow-up. No escalation.</text>
  <text x="390" y="302" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">English only</text>
  <rect x="370" y="370" width="270" height="100" rx="10" ry="10" fill="#FFF3F3" stroke="#FFCDD2" stroke-width="1"/>
  <text x="505" y="395" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C62828">What happens next?</text>
  <text x="390" y="418" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">Nothing. You check manually.</text>
  <text x="390" y="438" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">No SLA tracking. No escalation.</text>
  <text x="390" y="458" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#555555">If ignored, you start from scratch.</text>
  <line x1="700" y1="85" x2="700" y2="850" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="740" y="85" width="620" height="48" rx="8" ry="8" fill="#C8E6C9"/>
  <text x="1050" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32">LONDON CIVIC AGENT: 2 taps, 15 seconds</text>
  <rect x="780" y="175" width="250" height="70" rx="35" ry="35" fill="#6C63FF" stroke="#5A54D4" stroke-width="2"/>
  <text x="905" y="207" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Take a photo</text>
  <text x="905" y="227" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#d4d2ff">1 tap</text>
  <line x1="905" y1="245" x2="905" y2="275" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <rect x="780" y="280" width="250" height="70" rx="35" ry="35" fill="#6C63FF" stroke="#5A54D4" stroke-width="2"/>
  <text x="905" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">"Pothole here"</text>
  <text x="905" y="332" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#d4d2ff">voice note — any of 99 languages</text>
  <line x1="905" y1="350" x2="905" y2="380" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <rect x="780" y="385" width="250" height="50" rx="10" ry="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="905" y="416" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">Done.</text>
  <line x1="905" y1="435" x2="905" y2="465" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="760" y="470" width="290" height="340" rx="12" ry="12" fill="#F1F8E9" stroke="#8BC34A" stroke-width="1.5"/>
  <text x="905" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#33691E">Agent handles everything</text>
  <text x="785" y="528" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Classifies issue from photo</text>
  <rect x="1000" y="516" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="528" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="558" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Extracts GPS from photo EXIF</text>
  <rect x="1000" y="546" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="558" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="588" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Scores severity vs London data</text>
  <rect x="1000" y="576" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="588" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="618" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Finds correct council + dept</text>
  <rect x="1000" y="606" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="618" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="648" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Files the report</text>
  <rect x="1000" y="636" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="648" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="678" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Tracks SLA compliance</text>
  <rect x="1000" y="666" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="678" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="708" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Calls council if SLA breached</text>
  <rect x="1000" y="696" width="30" height="16" rx="3" ry="3" fill="#FF9800"/><text x="1015" y="708" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">esc.</text>
  <text x="785" y="738" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Escalates to LGO / MP if needed</text>
  <rect x="1000" y="726" width="30" height="16" rx="3" ry="3" fill="#FF9800"/><text x="1015" y="738" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">esc.</text>
  <text x="785" y="768" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">Updates public leaderboard</text>
  <rect x="1000" y="756" width="30" height="16" rx="3" ry="3" fill="#4CAF50"/><text x="1015" y="768" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">auto</text>
  <text x="785" y="798" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555">All processing local on DGX Spark</text>
  <rect x="1000" y="786" width="40" height="16" rx="3" ry="3" fill="#76b900"/><text x="1020" y="798" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#ffffff">private</text>
  <rect x="40" y="840" width="620" height="40" rx="8" ry="8" fill="#FFCDD2"/>
  <text x="350" y="866" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">8-10 clicks | 7 fields | 146 categories | 5-15 min | no follow-up</text>
  <rect x="740" y="840" width="620" height="40" rx="8" ry="8" fill="#C8E6C9"/>
  <text x="1050" y="866" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">1 photo | 1 voice note | 15 seconds | closed-loop</text>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E53935"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4CAF50"/></marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6C63FF"/></marker>
  </defs>
</svg>
