# London Civic Agent — NeMo Agent Toolkit v1.7 Configuration
#
# DROP-IN config for NVIDIA DGX Spark hackathon deployment.
#
# Quick start:
#   1. Start NIM container:
#      nemo-agent serve --model meta/llama-3.3-70b-instruct --gpus 2
#   2. Update the endpoint URL below to point at the running NIM instance
#   3. Run the pipeline:
#      nemo-agent run --config src/nemo/config.yaml
#
# For local development (mock mode):
#   python -m src.main --nemo --demo

version: "1.7"
name: london_civic_agent
description: >
  Multi-agent pipeline for triaging, scoring, routing, and submitting
  London civic complaints. Integrates real geospatial data (borough
  boundaries, schools, hospitals, collision hotspots) with LLM-powered
  text classification and report generation.

# ── Model ──────────────────────────────────────────────────────────────
model:
  name: meta/llama-3.3-70b-instruct
  provider: nim
  parameters:
    max_tokens: 2048
    temperature: 0.1
    top_p: 0.95

# ── Endpoint ───────────────────────────────────────────────────────────
# Update this URL when deploying on DGX Spark with a running NIM container.
endpoint:
  type: nim
  url: "http://localhost:8000/v1"
  # api_key: ${NIM_API_KEY}  # uncomment for authenticated endpoints

# ── Observability ──────────────────────────────────────────────────────
# NeMo Agent Toolkit provides OpenTelemetry tracing out of the box.
# Point the exporter at your collector (Jaeger, Zipkin, Grafana Tempo).
observability:
  enabled: true
  exporter: otlp
  service_name: london-civic-agent
  # endpoint: http://localhost:4317  # OTLP gRPC endpoint

# ── Pipeline ───────────────────────────────────────────────────────────
pipeline:
  type: sequential
  parallel: false

  agents:
    # ── 1. Intake Agent ──────────────────────────────────────────────
    - name: intake_agent
      description: >
        Parses raw civic complaint text into a structured issue with
        category, subcategory, title, and location.
      model: meta/llama-3.3-70b-instruct
      system_prompt: >
        You are the intake agent for the London Civic Agent system.
        Parse the user's civic complaint into structured fields: category,
        subcategory, title, address, and description. Use the 18-category
        taxonomy defined in the system. Extract London postcodes and
        street names.
      tools:
        - text_classifier
        - location_extractor
      guardrails:
        - input_pii_filter
        - topic_rail
      parameters:
        max_tokens: 2048
        temperature: 0.1

    # ── 2. Severity Agent ────────────────────────────────────────────
    - name: severity_agent
      description: >
        Scores civic issues 1-10 using category base scores, hazard
        keywords, proximity to sensitive locations, and repeat-report
        analysis.
      model: meta/llama-3.3-70b-instruct
      system_prompt: >
        You are the severity scoring agent. Given a structured CivicIssue,
        compute a severity score from 1-10 using: category base score,
        subcategory adjustment, hazard keyword detection, proximity to
        schools/hospitals/care homes, collision hotspot data, population
        density, and repeat-report clustering. Provide a justification.
      tools:
        - proximity_checker
        - repeat_area_checker
        - severity_matrix
      guardrails:
        - output_rail
      parameters:
        max_tokens: 2048
        temperature: 0.0

    # ── 3. Routing Agent ─────────────────────────────────────────────
    - name: routing_agent
      description: >
        Routes civic issues to the correct London borough council and
        department using geospatial matching and category-department
        mapping.
      model: meta/llama-3.3-70b-instruct
      system_prompt: >
        You are the routing agent. Given a CivicIssue with location data,
        determine which London borough council is responsible and which
        department handles this category. Check for TfL-managed roads.
        Use real borough boundary data for geospatial matching.
      tools:
        - borough_locator
        - tfl_road_checker
        - department_mapper
      guardrails:
        - output_rail
      parameters:
        max_tokens: 2048
        temperature: 0.0

    # ── 4. Submission Agent ──────────────────────────────────────────
    - name: submission_agent
      description: >
        Generates formal civic complaint reports suitable for submission
        to council portals or FixMyStreet.
      model: meta/llama-3.3-70b-instruct
      system_prompt: >
        You are the submission agent. Generate a formal, factual civic
        complaint report for submission to the identified council. Include
        all structured data (category, location, severity, routing). Keep
        it under 300 words, clear and actionable.
      tools:
        - report_formatter
        - fixmystreet_api
      guardrails:
        - output_contact_validator
        - output_rail
      parameters:
        max_tokens: 2048
        temperature: 0.3

    # ── 5. Escalation Agent ──────────────────────────────────────────
    - name: escalation_agent
      description: >
        Generates escalation documents (phone scripts, formal complaints,
        LGO/MP letters) for unresolved issues past SLA.
      model: meta/llama-3.3-70b-instruct
      system_prompt: >
        You are the escalation agent. For civic issues that have exceeded
        their SLA, generate escalation documents appropriate to the stage:
        Stage 1 (follow-up call script + chase letter),
        Stage 2 (formal complaint to council),
        Stage 3 (LGO complaint + MP letter). Use real council names,
        departments, and UK local government procedures.
      tools:
        - letter_generator
        - mp_lookup
        - lgo_reference
        - elevenlabs_voice
      guardrails:
        - output_contact_validator
        - output_rail
        - topic_rail
      parameters:
        max_tokens: 2048
        temperature: 0.3

# ── Guardrails ─────────────────────────────────────────────────────────
# NeMo Guardrails integration. Each rail references a Colang definition
# file that will be loaded by the guardrails runtime.
guardrails:
  input_pii_filter:
    type: input
    description: "Block PII in user input (UK phone, email, NI number)"
    config_path: guardrails/input_pii.co
    actions:
      - redact_phone_numbers
      - redact_email_addresses
      - redact_ni_numbers

  output_rail:
    type: output
    description: "Validate generated output does not hallucinate contacts"
    config_path: guardrails/output_validation.co
    actions:
      - validate_phone_numbers
      - validate_email_domains

  output_contact_validator:
    type: output
    description: "Ensure council contacts match known borough data"
    config_path: guardrails/contact_validation.co
    actions:
      - cross_reference_council_contacts

  topic_rail:
    type: topic
    description: "Keep conversations focused on civic issues"
    config_path: guardrails/topic_civic.co
    allowed_topics:
      - civic_complaints
      - road_defects
      - environmental_issues
      - housing_concerns
      - public_safety
    blocked_topics:
      - general_chat
      - financial_advice
      - medical_advice

# ── Tools ──────────────────────────────────────────────────────────────
# Tool definitions referenced by agents above. In NeMo Agent Toolkit,
# tools are Python functions exposed via the tool registry.
tools:
  text_classifier:
    description: "Classify civic complaint text into the 18-category taxonomy"
    module: src.agents.intake
    function: classify_text

  location_extractor:
    description: "Extract London addresses, postcodes, and coordinates"
    module: src.agents.intake
    function: extract_location

  proximity_checker:
    description: "Check proximity to schools, hospitals, and care homes"
    module: src.data.proximity_index
    function: check_proximity

  repeat_area_checker:
    description: "Query scraper DB for repeated reports in same area"
    module: src.agents.severity
    function: check_repeat_area

  severity_matrix:
    description: "Apply base score, modifiers, and caps from severity_factors.json"
    module: src.agents.severity
    function: apply_severity_matrix

  borough_locator:
    description: "Resolve coordinates to London borough using GeoJSON boundaries"
    module: src.agents.routing
    function: locate_borough

  tfl_road_checker:
    description: "Identify TfL-managed roads (A-roads, red routes)"
    module: src.integrations.tfl
    function: check_tfl_road

  department_mapper:
    description: "Map issue category to responsible council department"
    module: src.agents.routing
    function: map_department

  report_formatter:
    description: "Format structured CivicIssue into a submission report"
    module: src.agents.submission
    function: format_report

  fixmystreet_api:
    description: "Submit report to FixMyStreet API"
    module: src.integrations.fixmystreet
    function: submit_report

  letter_generator:
    description: "Generate escalation letters (chase, formal complaint, LGO/MP)"
    module: src.agents.escalation
    function: generate_letter

  mp_lookup:
    description: "Look up local MP for a given postcode"
    module: src.integrations.parliament
    function: lookup_mp

  lgo_reference:
    description: "Generate Local Government Ombudsman complaint reference"
    module: src.integrations.lgo
    function: generate_reference

  elevenlabs_voice:
    description: "Generate voice audio for phone call scripts"
    module: src.integrations.elevenlabs
    function: generate_voice
