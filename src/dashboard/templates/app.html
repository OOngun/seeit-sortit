<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Sorted</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<main class="app">

  <section class="landing">
    <div class="wordmark">Sorted<span class="dot-accent">.</span></div>
    <p class="tagline">Report. Track. Get it fixed.</p>

    <nav class="action-row" aria-label="Get started">
      <a class="action" href="/app/camera" aria-label="Take or upload a photo">
        <span class="action-btn" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8h3.2l1.5-2.2A1 1 0 019.5 5.3h5a1 1 0 01.83.45L16.8 8H20a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z"/>
            <circle cx="12" cy="13" r="3.4"/>
          </svg>
        </span>
        <span class="action-label">Camera</span>
      </a>

      <a class="action" href="/app/mic" aria-label="Record a voice description">
        <span class="action-btn" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="3" width="6" height="11" rx="3"/>
            <path d="M5 11a7 7 0 0014 0M12 18v3M9 21h6"/>
          </svg>
        </span>
        <span class="action-label">Microphone</span>
      </a>

      <a class="action" href="/app/home" aria-label="View your submitted reports">
        <span class="action-btn" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1z"/>
          </svg>
        </span>
        <span class="action-label">Home</span>
      </a>
    </nav>
  </section>

</main>

<footer class="app-foot">
  <span>Powered by AI</span>
  <span class="dot">&middot;</span>
  <span>Your data stays local</span>
  <span class="dot">&middot;</span>
  <a href="/">View admin dashboard &rarr;</a>
</footer>

</body>
</html>
