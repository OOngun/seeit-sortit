<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Take a photo · Sorted</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<main class="app">

  <header class="app-bar">
    <a class="back" href="/app" aria-label="Back to home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="title">Take a photo</h1>
    <span class="spacer"></span>
  </header>

  <section class="page">

    <!-- Intake view -->
    <div id="intakeView">
      <h2 class="page-heading">Show us the issue.</h2>
      <p class="page-sub">A photo helps us understand and route it faster.</p>

      <form id="cameraForm" autocomplete="off">

        <label class="drop-zone" id="dropZone">
          <input type="file" id="photoInput" accept="image/*" capture="environment" aria-label="Choose a photo">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3M12 4v12M7 9l5-5 5 5"/>
          </svg>
          <div class="drop-text">Tap to choose a photo</div>
          <div class="drop-hint">or drop it here &middot; JPG, PNG, HEIC up to 16 MB</div>
        </label>

        <div id="preview" class="preview" hidden style="margin-top:24px;">
          <div class="preview-frame">
            <img id="previewImg" alt="Your photo">
            <button type="button" class="preview-clear" id="clearPhoto" aria-label="Remove photo">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <div class="field">
            <label for="description">Describe the issue (optional)</label>
            <textarea id="description" placeholder="e.g. Large pothole on the corner of Whitechapel Road and Vallance Road."></textarea>
          </div>
        </div>

        <div id="notice" class="notice-error" role="alert"></div>

        <div class="actions-row" style="margin-top:24px;">
          <button type="submit" class="primary-btn" id="submitBtn" disabled>Submit report</button>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div class="loading" id="loadingView">
      <div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <p class="loading-text">Analysing your report &middot; routing to the right council</p>
    </div>

    <!-- Result -->
    <div class="result" id="resultView" aria-live="polite"></div>

  </section>

</main>

<footer class="app-foot">
  <span>Powered by AI</span>
  <span class="dot">&middot;</span>
  <span>Your data stays local</span>
  <span class="dot">&middot;</span>
  <a href="/">View admin dashboard &rarr;</a>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
