<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Your reports · Sorted</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<main class="app">

  <header class="app-bar">
    <a class="back" href="/app" aria-label="Back to home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="title">Your reports</h1>
    <span class="spacer"></span>
  </header>

  <section class="page">

    <h2 class="page-heading">Submitted reports.</h2>
    <p class="page-sub">Tap a card to see the details and what we sent in.</p>

    <div id="reportList" class="reports" aria-live="polite"></div>

    <div id="emptyState" class="empty-state" hidden>
      <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1z"/>
      </svg>
      <h3>No reports yet</h3>
      <p>Tap Camera or Mic to start.</p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <a class="primary-btn" href="/app/camera">Open camera</a>
        <a class="ghost-btn" href="/app/mic">Use voice</a>
      </div>
    </div>

  </section>

</main>

<footer class="app-foot">
  <span>Powered by AI</span>
  <span class="dot">&middot;</span>
  <span>Your data stays local</span>
  <span class="dot">&middot;</span>
  <a href="/">View admin dashboard &rarr;</a>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
